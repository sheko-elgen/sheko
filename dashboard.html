<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHEKO ELGEN Full Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--main:#ff2d55;--second:#ff7a18;--soft:#ffd1db}
body{min-height:100vh;font-family:Cairo,Poppins,sans-serif;color:#fff;background:radial-gradient(circle at top right,rgba(255,45,85,.20),transparent 30%),radial-gradient(circle at bottom left,rgba(255,122,24,.15),transparent 30%),linear-gradient(135deg,#08080d,#16080f,#08080d)}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-card,.panel{background:rgba(0,0,0,.40);border:1px solid rgba(255,255,255,.12);border-radius:28px;padding:30px;backdrop-filter:blur(12px);box-shadow:0 0 35px rgba(0,0,0,.35)}
.login-card{width:100%;max-width:470px}h1{font-size:34px;color:var(--main);margin-bottom:8px;font-weight:900}p{color:#cfcfcf;line-height:1.7}
label{display:block;margin:14px 0 7px;color:var(--soft);font-weight:900}
input,textarea,select{width:100%;padding:13px 15px;border-radius:14px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.38);color:#fff;outline:none;font-family:Cairo,Poppins,sans-serif}
textarea{min-height:100px;resize:vertical}
button,.btn{margin-top:16px;padding:13px 18px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--main),var(--second));color:#fff;font-weight:900;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:9px;font-family:Cairo,Poppins,sans-serif}
button.secondary,.btn.secondary{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.14)}button.danger{background:linear-gradient(135deg,#ff6868,#a80000);color:#fff}
.hidden{display:none!important}.layout{display:grid;grid-template-columns:290px 1fr;min-height:100vh}.sidebar{padding:24px;border-left:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.38);position:sticky;top:0;height:100vh;overflow:auto}
.brand{font-size:24px;font-weight:900;color:var(--main);margin-bottom:24px}.brand span{color:#fff}.menu{display:flex;flex-direction:column;gap:10px}.menu button{margin:0;width:100%;background:rgba(255,255,255,.06);color:#fff;text-align:right;border:1px solid rgba(255,255,255,.08)}.menu button.active{background:rgba(255,45,85,.22);border-color:rgba(255,45,85,.50)}
.main{padding:28px}.panel{max-width:1150px;margin:0 auto 22px}.panel-title{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:18px}.row{display:grid;grid-template-columns:1fr 1fr;gap:16px}.three{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.status{margin-top:14px;color:#9dffb2;font-weight:900}.warn{margin-top:14px;color:#ffd36d;font-size:13px}.preview-link{color:var(--main);text-decoration:none;font-weight:900}
.link-box,.content-box{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:16px;margin-bottom:14px}.link-head{display:flex;justify-content:space-between;align-items:center;gap:12px}.small-actions{display:flex;gap:8px;flex-wrap:wrap}.small-actions button{padding:9px 12px;margin:0;border-radius:10px}
@media(max-width:900px){.layout{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.row,.three{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="login-page" id="loginPage"><div class="login-card"><h1>Sheko Admin</h1><p>لوحة تحكم كاملة لموقع SHEKO ELGEN.</p><label>Password</label><input type="password" id="passwordInput" placeholder="Enter admin password"><button onclick="login()"><i class="fa-solid fa-lock-open"></i> Login</button><div class="warn">Password: <b>Sheko2026</b></div></div></div>
<div class="layout hidden" id="dashboardPage">
<aside class="sidebar"><div class="brand">SHEKO <span>ADMIN</span></div><div class="menu">
<button class="active" onclick="showTab('general', this)"><i class="fa-solid fa-sliders"></i> General</button>
<button onclick="showTab('hero', this)"><i class="fa-solid fa-house"></i> Hero</button>
<button onclick="showTab('live', this)"><i class="fa-solid fa-video"></i> Next Live</button>
<button onclick="showTab('links', this)"><i class="fa-solid fa-link"></i> Links</button>
<button onclick="showTab('content', this)"><i class="fa-solid fa-pen"></i> Content</button>
<button onclick="showTab('contact', this)"><i class="fa-solid fa-phone"></i> Contact</button>
<button onclick="showTab('theme', this)"><i class="fa-solid fa-palette"></i> Theme</button>
<button class="danger" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
</div></aside>
<main class="main">
<div class="panel"><div class="panel-title"><div><h1>Dashboard</h1><p>كل تعديل هنا بيتحفظ في Firebase ويظهر في الموقع.</p></div><a class="preview-link" href="index.html" target="_blank">Open Website</a></div><button onclick="saveSettings()"><i class="fa-solid fa-floppy-disk"></i> Save All Changes</button><button class="secondary" onclick="loadSettings()"><i class="fa-solid fa-rotate"></i> Reload</button><div class="status" id="statusMsg"></div></div>

<section class="panel tab" id="tab-general"><h1>General</h1><div class="row"><div><label>Streamer Name</label><input id="streamerName"></div><div><label>Arabic Name</label><input id="arabicName"></div></div><div class="row"><div><label>Tagline</label><input id="tagline"></div><div><label>Profile Image</label><input id="profileImage"></div></div><label>Description</label><textarea id="description"></textarea><label>Footer Text</label><input id="footer"></section>

<section class="panel tab hidden" id="tab-hero"><h1>Hero</h1><div class="row"><div><label>Badge</label><input id="badge"></div><div><label>Hero Button 1</label><input id="button1Text"></div></div><div class="row"><div><label>Hero Button 2</label><input id="button2Text"></div><div><label>Hero Button 3</label><input id="button3Text"></div></div></section>

<section class="panel tab hidden" id="tab-live"><h1>Next Live</h1><div class="row"><div><label>عنوان اللايف</label><input id="liveTitle"></div><div><label>تاريخ ووقت اللايف</label><input type="datetime-local" id="liveDate"></div></div><label>وصف اللايف</label><textarea id="liveDescription"></textarea><div class="row"><div><label>Live Now</label><select id="liveNow"><option value="false">No</option><option value="true">Yes</option></select></div><div><label>Starting Soon</label><select id="startingSoon"><option value="false">No</option><option value="true">Yes</option></select></div></div></section>

<section class="panel tab hidden" id="tab-links"><div class="panel-title"><div><h1>Links</h1><p>ضيف، احذف، رتب، وخلي أي لينك يظهر أو يختفي.</p></div><button onclick="addLink()"><i class="fa-solid fa-plus"></i> Add Link</button></div><div id="linksArea"></div></section>

<section class="panel tab hidden" id="tab-content"><div class="panel-title"><div><h1>Content Cards</h1><p>الكروت اللي تحت المحتوى.</p></div><button onclick="addContent()"><i class="fa-solid fa-plus"></i> Add Card</button></div><div id="contentArea"></div></section>

<section class="panel tab hidden" id="tab-contact"><h1>Contact</h1><div class="row"><div><label>Contact Title</label><input id="contactTitle"></div><div><label>Phone</label><input id="contactPhone"></div></div><label>Contact Text</label><textarea id="contactText"></textarea></section>

<section class="panel tab hidden" id="tab-theme"><h1>Theme</h1><div class="three"><div><label>Main Color</label><input type="color" id="themeMain"></div><div><label>Second Color</label><input type="color" id="themeSecond"></div><div><label>Background</label><input type="color" id="themeBg"></div><div><label>Card</label><input type="color" id="themeCard"></div><div><label>Text</label><input type="color" id="themeText"></div><div><label>Muted</label><input type="color" id="themeMuted"></div></div></section>
</main></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyBTZXEM4iWNP0etChRpLxKBSVEgH5Ea9I0",
  authDomain: "sheko-dashboard.firebaseapp.com",
  projectId: "sheko-dashboard",
  storageBucket: "sheko-dashboard.firebasestorage.app",
  messagingSenderId: "355456416877",
  appId: "1:355456416877:web:783bdf271faba4f859364"
};
const ADMIN_PASSWORD = "Sheko2026";
const DEFAULT_DATA = {"site": {"streamerName": "SHEKO ELGEN", "arabicName": "شيكو الجن", "tagline": "FiveM · PUBG · Challenges", "description": "محتوى جيمينج مصري بشكل احترافي، لايفات، ضحك، تحديات، وكوميونيتي جامد.", "profileImage": "sheko.jpg", "footer": "© 2026 SHEKO ELGEN — Designed by ELMNOUFY"}, "hero": {"badge": "GAMING STREAMER", "button1Text": "شاهد على Kick", "button2Text": "YouTube", "button3Text": "ادعم الستريم"}, "live": {"title": "اللايف الجاي قريبًا على Kick", "description": "FiveM RP Night — استنونا في لايف نار.", "date": "2026-07-01T22:00", "liveNow": false, "startingSoon": false}, "contact": {"title": "تعاون أو إعلان؟", "text": "للتواصل بخصوص الإعلانات، التعاون، أو إدارة المحتوى.", "phone": "01066787472"}, "theme": {"main": "#ff2d55", "second": "#ff7a18", "bg": "#07070b", "card": "#15151f", "text": "#f5f5fb", "muted": "#9a9ab3", "animations": true}, "links": [{"name": "Kick", "url": "https://kick.com/sheko-elgen", "icon": "fa-brands fa-kickstarter-k", "color": "#53fc18", "visible": true, "newTab": true, "description": "البث المباشر واللايفات الأساسية."}, {"name": "YouTube", "url": "https://youtube.com/@sheko_elgen?si=DIdFs4z7tbNAhIiW", "icon": "fa-brands fa-youtube", "color": "#ff0000", "visible": true, "newTab": true, "description": "فيديوهات وهايلايتس شيكو."}, {"name": "TikTok", "url": "https://www.tiktok.com/@sheko719", "icon": "fa-brands fa-tiktok", "color": "#ff0050", "visible": true, "newTab": true, "description": "كليبات قصيرة ولحظات من اللايف."}, {"name": "Discord", "url": "https://discord.gg/uJekbhqJ", "icon": "fa-brands fa-discord", "color": "#5865f2", "visible": true, "newTab": true, "description": "سيرفر الكوميونيتي والتجمعات."}, {"name": "WhatsApp", "url": "https://whatsapp.com/channel/0029VaiH8CL9WtBwKFaKZb2Q", "icon": "fa-brands fa-whatsapp", "color": "#25d366", "visible": true, "newTab": true, "description": "قناة الأخبار ومواعيد اللايف."}, {"name": "Telegram", "url": "https://t.me/shekoostore12", "icon": "fa-brands fa-telegram", "color": "#229ed9", "visible": true, "newTab": true, "description": "متجر وحسابات وتحديثات."}, {"name": "Instagram", "url": "https://www.instagram.com/mohamedshekoo_official", "icon": "fa-brands fa-instagram", "color": "#e1306c", "visible": true, "newTab": true, "description": "صور وكواليس من خلف الستريم."}, {"name": "Snapchat", "url": "https://snapchat.com/t/LKzg4dRF", "icon": "fa-brands fa-snapchat", "color": "#fffc00", "visible": true, "newTab": true, "description": "سنابات يومية ومحتوى سريع."}, {"name": "TikAlert", "url": "https://tikalert-eg.com/sheko123", "icon": "fa-solid fa-gift", "color": "#ff7a18", "visible": true, "newTab": true, "description": "ادعم الستريم وساعد المحتوى يكبر."}, {"name": "PayPal", "url": "https://paypal.me/shekostore12", "icon": "fa-brands fa-paypal", "color": "#0070ba", "visible": true, "newTab": true, "description": "ادعم شيكو الجن عن طريق PayPal."}], "content": [{"icon": "fa-solid fa-car-side", "title": "FiveM Roleplay", "text": "مواقف RP، مطاردات، سيناريوهات، وضحك مع الكوميونيتي."}, {"icon": "fa-solid fa-crosshairs", "title": "PUBG Action", "text": "جيم بلاي، تحديات، لقطات قوية، وماتشات نار."}, {"icon": "fa-solid fa-users", "title": "Community Nights", "text": "لايفات تفاعل، مسابقات، دخول متابعين، وجو صحاب."}]};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const settingsRef = doc(db, "site", "settings");
let data = JSON.parse(JSON.stringify(DEFAULT_DATA));
window.data = data;

window.login = async function(){if(passwordInput.value!==ADMIN_PASSWORD){alert("Wrong password");return}loginPage.classList.add("hidden");dashboardPage.classList.remove("hidden");await loadSettings()}
window.logout=function(){dashboardPage.classList.add("hidden");loginPage.classList.remove("hidden");passwordInput.value=""}
window.showTab=function(tab,btn){document.querySelectorAll(".tab").forEach(el=>el.classList.add("hidden"));document.getElementById("tab-"+tab).classList.remove("hidden");document.querySelectorAll(".menu button").forEach(el=>el.classList.remove("active"));btn.classList.add("active")}

function merge(raw){const d={...DEFAULT_DATA,...(raw||{})};d.site={...DEFAULT_DATA.site,...(d.site||{})};d.hero={...DEFAULT_DATA.hero,...(d.hero||{})};d.live={...DEFAULT_DATA.live,...(d.live||{})};d.contact={...DEFAULT_DATA.contact,...(d.contact||{})};d.theme={...DEFAULT_DATA.theme,...(d.theme||{})};d.links=d.links||DEFAULT_DATA.links;d.content=d.content||DEFAULT_DATA.content;return d}

window.loadSettings=async function(){statusMsg.textContent="Loading...";try{const snap=await getDoc(settingsRef);if(snap.exists()) {
  data=merge(snap.data());
  window.data=data;
} else {
  data=JSON.parse(JSON.stringify(DEFAULT_DATA));
  window.data=data;
  await setDoc(settingsRef,data);
}
fill();statusMsg.textContent="Loaded."}catch(e){statusMsg.textContent="Firebase Error: "+e.message}}
window.saveSettings=async function(){collect();try{await setDoc(settingsRef,data);statusMsg.textContent="Saved successfully. Website updated."}catch(e){statusMsg.textContent="Save Error: "+e.message}}

function fill(){streamerName.value=data.site.streamerName;arabicName.value=data.site.arabicName;tagline.value=data.site.tagline;description.value=data.site.description;profileImage.value=data.site.profileImage;footer.value=data.site.footer;badge.value=data.hero.badge;button1Text.value=data.hero.button1Text;button2Text.value=data.hero.button2Text;button3Text.value=data.hero.button3Text;liveTitle.value=data.live.title;liveDescription.value=data.live.description;liveDate.value=(data.live.date||"").slice(0,16);liveNow.value=String(!!data.live.liveNow);startingSoon.value=String(!!data.live.startingSoon);contactTitle.value=data.contact.title;contactText.value=data.contact.text;contactPhone.value=data.contact.phone;themeMain.value=data.theme.main;themeSecond.value=data.theme.second;themeBg.value=data.theme.bg;themeCard.value=data.theme.card;themeText.value=data.theme.text;themeMuted.value=data.theme.muted;renderLinks();renderContent()}
function collect(){data.site.streamerName=streamerName.value;data.site.arabicName=arabicName.value;data.site.tagline=tagline.value;data.site.description=description.value;data.site.profileImage=profileImage.value;data.site.footer=footer.value;data.hero.badge=badge.value;data.hero.button1Text=button1Text.value;data.hero.button2Text=button2Text.value;data.hero.button3Text=button3Text.value;data.live.title=liveTitle.value;data.live.description=liveDescription.value;data.live.date=liveDate.value;data.live.liveNow=liveNow.value==="true";data.live.startingSoon=startingSoon.value==="true";data.contact.title=contactTitle.value;data.contact.text=contactText.value;data.contact.phone=contactPhone.value;data.theme.main=themeMain.value;data.theme.second=themeSecond.value;data.theme.bg=themeBg.value;data.theme.card=themeCard.value;data.theme.text=themeText.value;data.theme.muted=themeMuted.value}

function esc(s){return String(s||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;")}

function detectLinkInfo(url){
  const u = String(url || "").toLowerCase();
  if(u.includes("discord.gg") || u.includes("discord.com/invite")) return {name:"Discord", icon:"fa-brands fa-discord", color:"#5865f2", description:"سيرفر الكوميونيتي والتجمعات."};
  if(u.includes("youtube.com") || u.includes("youtu.be")) return {name:"YouTube", icon:"fa-brands fa-youtube", color:"#ff0000", description:"فيديوهات وهايلايتس."};
  if(u.includes("kick.com")) return {name:"Kick", icon:"fa-brands fa-kickstarter-k", color:"#53fc18", description:"البث المباشر واللايفات الأساسية."};
  if(u.includes("tiktok.com")) return {name:"TikTok", icon:"fa-brands fa-tiktok", color:"#ff0050", description:"كليبات قصيرة ولحظات من اللايف."};
  if(u.includes("instagram.com")) return {name:"Instagram", icon:"fa-brands fa-instagram", color:"#e1306c", description:"صور وكواليس."};
  if(u.includes("whatsapp.com") || u.includes("wa.me")) return {name:"WhatsApp", icon:"fa-brands fa-whatsapp", color:"#25d366", description:"قناة الأخبار ومواعيد اللايف."};
  if(u.includes("t.me") || u.includes("telegram")) return {name:"Telegram", icon:"fa-brands fa-telegram", color:"#229ed9", description:"تحديثات وأخبار."};
  if(u.includes("snapchat.com")) return {name:"Snapchat", icon:"fa-brands fa-snapchat", color:"#fffc00", description:"سنابات يومية ومحتوى سريع."};
  if(u.includes("paypal.me") || u.includes("paypal.com")) return {name:"PayPal", icon:"fa-brands fa-paypal", color:"#0070ba", description:"الدعم عن طريق PayPal."};
  if(u.includes("tikalert")) return {name:"TikAlert", icon:"fa-solid fa-gift", color:"#ff7a18", description:"ادعم الستريم وساعد المحتوى يكبر."};
  return null;
}

window.autoFillLink=function(i,url){
  data.links[i].url = url;
  const info = detectLinkInfo(url);
  if(!info) return;
  const oldName = String(data.links[i].name || "").trim().toLowerCase();
  if(!oldName || oldName === "new link" || oldName === "add link" || oldName === "link") data.links[i].name = info.name;
  data.links[i].icon = info.icon;
  data.links[i].color = info.color;
  if(!String(data.links[i].description || "").trim()) data.links[i].description = info.description;
  renderLinks();
}

function renderLinks(){linksArea.innerHTML="";data.links.forEach((l,i)=>{const box=document.createElement("div");box.className="link-box";box.innerHTML=`<div class="link-head"><b>${i+1} - ${esc(l.name)}</b><div class="small-actions"><button class="secondary" onclick="moveLink(${i},-1)">↑</button><button class="secondary" onclick="moveLink(${i},1)">↓</button><button class="danger" onclick="deleteLink(${i})">Delete</button></div></div><div class="row"><div><label>Name</label><input value="${esc(l.name)}" oninput="data.links[${i}].name=this.value"></div><div><label>URL</label><input value="${esc(l.url)}" oninput="autoFillLink(${i}, this.value)"></div></div><div class="row"><div><label>Icon Class</label><input value="${esc(l.icon)}" oninput="data.links[${i}].icon=this.value"></div><div><label>Color</label><input type="color" value="${l.color}" oninput="data.links[${i}].color=this.value"></div></div><div class="row"><div><label>Visible</label><select onchange="data.links[${i}].visible=this.value==='true'"><option value="true" ${l.visible!==false?'selected':''}>Yes</option><option value="false" ${l.visible===false?'selected':''}>No</option></select></div><div><label>Open New Tab</label><select onchange="data.links[${i}].newTab=this.value==='true'"><option value="true" ${l.newTab!==false?'selected':''}>Yes</option><option value="false" ${l.newTab===false?'selected':''}>No</option></select></div></div><label>Description</label><textarea oninput="data.links[${i}].description=this.value">${esc(l.description)}</textarea>`;linksArea.appendChild(box)})}
window.addLink=function(){data.links.push({name:"Link",url:"",icon:"fa-solid fa-link",color:"#ff2d55",visible:true,newTab:true,description:""});renderLinks()}
window.deleteLink=function(i){if(confirm("Delete this link?")){data.links.splice(i,1);renderLinks()}}
window.moveLink=function(i,d){const j=i+d;if(j<0||j>=data.links.length)return;[data.links[i],data.links[j]]=[data.links[j],data.links[i]];renderLinks()}

function renderContent(){contentArea.innerHTML="";data.content.forEach((c,i)=>{const box=document.createElement("div");box.className="content-box";box.innerHTML=`<div class="link-head"><b>Card ${i+1}</b><div class="small-actions"><button class="danger" onclick="deleteContent(${i})">Delete</button></div></div><div class="row"><div><label>Icon</label><input value="${esc(c.icon)}" oninput="data.content[${i}].icon=this.value"></div><div><label>Title</label><input value="${esc(c.title)}" oninput="data.content[${i}].title=this.value"></div></div><label>Text</label><textarea oninput="data.content[${i}].text=this.value">${esc(c.text)}</textarea>`;contentArea.appendChild(box)})}
window.addContent=function(){data.content.push({icon:"fa-solid fa-star",title:"New Card",text:"Text here..."});renderContent()}
window.deleteContent=function(i){if(confirm("Delete this card?")){data.content.splice(i,1);renderContent()}}
</script>
</body></html>
