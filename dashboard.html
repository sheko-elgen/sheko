<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sheko Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Rubik:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Cairo,sans-serif;background:#08080d;color:#fff;line-height:1.6}
body:before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 20% 10%,rgba(255,45,85,.18),transparent 30%),radial-gradient(circle at 90% 20%,rgba(255,122,24,.12),transparent 25%);z-index:-1}
.wrap{width:min(1250px,94%);margin:auto;padding:24px 0}
.top{display:flex;justify-content:space-between;align-items:center;gap:15px;margin-bottom:18px}
.logo{font-family:Rubik;font-weight:900;font-size:1.45rem}.logo span{color:#ff2d55}
.grid{display:grid;grid-template-columns:270px 1fr;gap:16px}
.side,.panel{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:16px}
.tabs{display:flex;flex-direction:column;gap:9px}
.tab{padding:12px 14px;border:1px solid rgba(255,255,255,.08);border-radius:14px;background:rgba(255,255,255,.04);color:#bbb;cursor:pointer;font-weight:900;text-align:right}
.tab.active,.tab:hover{background:linear-gradient(135deg,#ff2d55,#ff7a18);color:#fff}
.section{display:none}.section.active{display:block}
h2{font-family:Rubik;margin-bottom:14px}
.form{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.field{display:flex;flex-direction:column;gap:6px}.field.full{grid-column:1/-1}
label{color:#d9d9e5;font-weight:800;font-size:.9rem}
input,textarea,select{width:100%;padding:12px;border-radius:13px;border:1px solid rgba(255,255,255,.12);background:#101018;color:#fff;font-family:Cairo;font-size:1rem}
textarea{min-height:92px;resize:vertical}
.actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px}
.btn{border:0;border-radius:13px;padding:12px 16px;font-family:Cairo;font-weight:900;color:#fff;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:8px}
.save{background:linear-gradient(135deg,#ff2d55,#ff7a18)}.ghost{background:rgba(255,255,255,.1)}.danger{background:#b00020}
.note{background:rgba(255,189,46,.12);border:1px solid rgba(255,189,46,.3);color:#ffd98a;border-radius:16px;padding:13px;margin-bottom:14px}
.status{margin-top:12px;color:#9dfca5;font-weight:900;min-height:23px}
.link-card,.content-row{background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:12px;margin-bottom:10px}
.link-head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px}
.mini-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.preview{margin-top:14px;background:#11111a;border-radius:16px;border:1px solid rgba(255,255,255,.1);padding:12px;max-height:260px;overflow:auto;direction:ltr;text-align:left;color:#b8ffbd;font-family:monospace;font-size:.8rem;white-space:pre-wrap}
@media(max-width:900px){.grid{grid-template-columns:1fr}.form,.mini-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="logo">SHEKO <span>DASHBOARD</span></div>
    <div class="actions">
      <a class="btn ghost" href="index.html">فتح الموقع</a>
      <button class="btn save" onclick="downloadJson()">Download data.json</button>
    </div>
  </div>

  <div class="note">
    استخدم الداش بورد كده: افتحها، اضغط Load data.json، عدّل، ثم Download data.json، وبعدها ارفع data.json الجديد مكان القديم على GitHub.
  </div>

  <div class="grid">
    <aside class="side">
      <div class="tabs">
        <button class="tab active" data-tab="load">1) تحميل البيانات</button>
        <button class="tab" data-tab="site">2) بيانات الموقع</button>
        <button class="tab" data-tab="links">3) الروابط</button>
        <button class="tab" data-tab="live">4) اللايف</button>
        <button class="tab" data-tab="theme">5) الألوان</button>
        <button class="tab" data-tab="content">6) المحتوى</button>
        <button class="tab" data-tab="export">7) تنزيل الملف</button>
      </div>
    </aside>

    <main class="panel">
      <section id="load" class="section active">
        <h2>تحميل data.json</h2>
        <div class="form">
          <div class="field full">
            <label>اختار ملف data.json القديم من جهازك</label>
            <input type="file" accept="application/json" onchange="loadJsonFile(event)">
          </div>
        </div>
        <div class="actions">
          <button class="btn ghost" onclick="loadDefault()">استخدم بيانات جاهزة</button>
        </div>
        <div id="loadStatus" class="status"></div>
      </section>

      <section id="site" class="section">
        <h2>بيانات الموقع</h2>
        <div class="form">
          <div class="field"><label>اسم الستريمر</label><input id="streamerName"></div>
          <div class="field"><label>الاسم العربي</label><input id="arabicName"></div>
          <div class="field full"><label>Tagline</label><input id="tagline"></div>
          <div class="field full"><label>الوصف</label><textarea id="description"></textarea></div>
          <div class="field"><label>صورة البروفايل</label><input id="profileImage" placeholder="sheko.jpg"></div>
          <div class="field"><label>رقم الهاتف</label><input id="phone"></div>
          <div class="field"><label>عنوان التواصل</label><input id="businessTitle"></div>
          <div class="field full"><label>نص التواصل</label><textarea id="businessText"></textarea></div>
        </div>
      </section>

      <section id="links" class="section">
        <h2>الروابط</h2>
        <div class="actions">
          <button class="btn save" onclick="addLink()">+ إضافة لينك</button>
        </div>
        <div id="linksEditor"></div>
      </section>

      <section id="live" class="section">
        <h2>اللايف</h2>
        <div class="form">
          <div class="field full"><label>عنوان اللايف</label><input id="liveTitle"></div>
          <div class="field full"><label>وصف اللايف</label><textarea id="liveDescription"></textarea></div>
          <div class="field"><label>تاريخ ووقت اللايف</label><input id="liveDate" type="datetime-local"></div>
          <div class="field"><label>Live Now</label><select id="liveNow"><option value="false">لا</option><option value="true">نعم</option></select></div>
          <div class="field"><label>Starting Soon</label><select id="startingSoon"><option value="false">لا</option><option value="true">نعم</option></select></div>
        </div>
      </section>

      <section id="theme" class="section">
        <h2>الألوان</h2>
        <div class="form">
          <div class="field"><label>الأساسي</label><input id="themeMain" type="color"></div>
          <div class="field"><label>الثاني</label><input id="themeSecond" type="color"></div>
          <div class="field"><label>الخلفية</label><input id="themeBg" type="color"></div>
          <div class="field"><label>الكروت</label><input id="themeCard" type="color"></div>
          <div class="field"><label>النص</label><input id="themeText" type="color"></div>
          <div class="field"><label>النص الخفيف</label><input id="themeMuted" type="color"></div>
        </div>
      </section>

      <section id="content" class="section">
        <h2>المحتوى</h2>
        <div id="contentEditor"></div>
      </section>

      <section id="export" class="section">
        <h2>تنزيل الملف الجديد</h2>
        <div class="actions">
          <button class="btn save" onclick="downloadJson()">Download data.json</button>
          <button class="btn ghost" onclick="copyJson()">نسخ JSON</button>
        </div>
        <div id="exportStatus" class="status"></div>
        <pre id="jsonPreview" class="preview"></pre>
      </section>
    </main>
  </div>
</div>

<script>
let DATA = {
  site:{streamerName:"SHEKO ELGEN",arabicName:"شيكو الجن",tagline:"FiveM · PUBG · Challenges",description:"محتوى جيمينج مصري بشكل احترافي، لايفات، ضحك، تحديات، وكوميونيتي جامد.",profileImage:"sheko.jpg",phone:"01066787472",businessTitle:"تعاون أو إعلان؟",businessText:"للتواصل بخصوص الإعلانات، التعاون، أو إدارة المحتوى."},
  live:{title:"اللايف الجاي قريبًا على Kick",description:"FiveM RP Night — استنونا في لايف نار.",date:"2026-07-01T22:00",startingSoon:false,liveNow:false},
  theme:{main:"#ff2d55",second:"#ff7a18",bg:"#07070b",card:"#15151f",text:"#f5f5fb",muted:"#aaaabc"},
  links:[
    {name:"Kick",url:"https://kick.com/sheko-elgen",iconType:"fa",icon:"fa-brands fa-kickstarter-k",color:"#53fc18",visible:true,newTab:true,description:"البث المباشر واللايفات الأساسية."},
    {name:"TikTok",url:"https://www.tiktok.com/@sheko719",iconType:"fa",icon:"fa-brands fa-tiktok",color:"#ff0050",visible:true,newTab:true,description:"كليبات قصيرة ولحظات من اللايف."},
    {name:"PayPal",url:"https://paypal.me/shekostore12",iconType:"fa",icon:"fa-brands fa-paypal",color:"#009cde",visible:true,newTab:true,description:"ادعم شيكو عن طريق PayPal."}
  ],
  content:[
    {icon:"fa-solid fa-car-side",title:"FiveM Roleplay",text:"مواقف RP، مطاردات، سيناريوهات، وضحك مع الكوميونيتي."},
    {icon:"fa-solid fa-crosshairs",title:"PUBG Action",text:"جيم بلاي، تحديات، لقطات قوية، وماتشات نار."},
    {icon:"fa-solid fa-users",title:"Community Nights",text:"لايفات تفاعل، مسابقات، دخول متابعين، وجو صحاب."}
  ]
};

const $ = id => document.getElementById(id);

document.querySelectorAll(".tab").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".tab,.section").forEach(x=>x.classList.remove("active"));
    btn.classList.add("active");
    $(btn.dataset.tab).classList.add("active");
    refresh();
  };
});

function loadDefault(){
  fillForms();
  renderLinks();
  renderContent();
  refresh();
  loadStatus.textContent = "تم تحميل بيانات جاهزة ✅";
}

function loadJsonFile(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      DATA = JSON.parse(reader.result);
      if(!DATA.site && DATA.streamerName){
        DATA = convertOldData(DATA);
      }
      fillForms(); renderLinks(); renderContent(); refresh();
      loadStatus.textContent = "تم تحميل data.json ✅";
    }catch(err){
      loadStatus.textContent = "الملف مش JSON صحيح";
    }
  };
  reader.readAsText(file);
}

function convertOldData(old){
  return {
    site:{streamerName:old.streamerName||"SHEKO ELGEN",arabicName:old.arabicName||"",tagline:old.tagline||"",description:old.description||"",profileImage:old.profileImage||"sheko.jpg",phone:old.phone||"",businessTitle:"تعاون أو إعلان؟",businessText:"للتواصل بخصوص الإعلانات."},
    live:{title:old.nextLiveTitle||"",description:old.nextLiveDescription||"",date:old.nextLiveDate||"",startingSoon:false,liveNow:false},
    theme:old.theme||{main:"#ff2d55",second:"#ff7a18",bg:"#07070b",card:"#15151f",text:"#f5f5fb",muted:"#aaaabc"},
    links:Object.entries(old.links||{}).map(([name,url])=>({name,url,iconType:"fa",icon:"fa-solid fa-link",color:"#ff2d55",visible:true,newTab:true,description:""})),
    content:old.content||[]
  }
}

function fillForms(){
  let s=DATA.site,t=DATA.theme,l=DATA.live;
  streamerName.value=s.streamerName||"";
  arabicName.value=s.arabicName||"";
  tagline.value=s.tagline||"";
  description.value=s.description||"";
  profileImage.value=s.profileImage||"";
  phone.value=s.phone||"";
  businessTitle.value=s.businessTitle||"";
  businessText.value=s.businessText||"";
  liveTitle.value=l.title||"";
  liveDescription.value=l.description||"";
  liveDate.value=(l.date||"").slice(0,16);
  liveNow.value=String(!!l.liveNow);
  startingSoon.value=String(!!l.startingSoon);
  themeMain.value=t.main||"#ff2d55";
  themeSecond.value=t.second||"#ff7a18";
  themeBg.value=t.bg||"#07070b";
  themeCard.value=t.card||"#15151f";
  themeText.value=t.text||"#f5f5fb";
  themeMuted.value=t.muted||"#aaaabc";
}

function collect(){
  DATA.site.streamerName=streamerName.value;
  DATA.site.arabicName=arabicName.value;
  DATA.site.tagline=tagline.value;
  DATA.site.description=description.value;
  DATA.site.profileImage=profileImage.value;
  DATA.site.phone=phone.value;
  DATA.site.businessTitle=businessTitle.value;
  DATA.site.businessText=businessText.value;
  DATA.live.title=liveTitle.value;
  DATA.live.description=liveDescription.value;
  DATA.live.date=liveDate.value;
  DATA.live.liveNow=liveNow.value==="true";
  DATA.live.startingSoon=startingSoon.value==="true";
  DATA.theme.main=themeMain.value;
  DATA.theme.second=themeSecond.value;
  DATA.theme.bg=themeBg.value;
  DATA.theme.card=themeCard.value;
  DATA.theme.text=themeText.value;
  DATA.theme.muted=themeMuted.value;
  return DATA;
}

document.addEventListener("input", refresh);

function refresh(){
  collect();
  jsonPreview.textContent = JSON.stringify(DATA,null,2);
}

function esc(v){return String(v||"").replaceAll("&","&amp;").replaceAll('"',"&quot;").replaceAll("<","&lt;").replaceAll(">","&gt;")}

function renderLinks(){
  linksEditor.innerHTML = DATA.links.map((x,i)=>`
    <div class="link-card">
      <div class="link-head">
        <b>${i+1} - ${esc(x.name)}</b>
        <div>
          <button class="btn ghost" onclick="moveLink(${i},-1)">↑</button>
          <button class="btn ghost" onclick="moveLink(${i},1)">↓</button>
          <button class="btn danger" onclick="deleteLink(${i})">حذف</button>
        </div>
      </div>
      <div class="mini-grid">
        <div class="field"><label>الاسم</label><input value="${esc(x.name)}" oninput="DATA.links[${i}].name=this.value;refresh();"></div>
        <div class="field"><label>اللينك</label><input value="${esc(x.url)}" oninput="DATA.links[${i}].url=this.value;refresh();"></div>
        <div class="field"><label>اللون</label><input type="color" value="${x.color}" oninput="DATA.links[${i}].color=this.value;refresh();"></div>
        <div class="field"><label>نوع الأيقونة</label><select onchange="DATA.links[${i}].iconType=this.value;refresh();"><option value="fa" ${x.iconType==='fa'?'selected':''}>FontAwesome</option><option value="img" ${x.iconType==='img'?'selected':''}>صورة</option></select></div>
        <div class="field"><label>الأيقونة</label><input value="${esc(x.icon)}" oninput="DATA.links[${i}].icon=this.value;refresh();"></div>
        <div class="field"><label>رفع صورة أيقونة</label><input type="file" accept="image/*" onchange="uploadIcon(event,${i})"></div>
        <div class="field"><label>ظاهر؟</label><select onchange="DATA.links[${i}].visible=this.value==='true';refresh();"><option value="true" ${x.visible?'selected':''}>نعم</option><option value="false" ${!x.visible?'selected':''}>لا</option></select></div>
        <div class="field full"><label>الوصف</label><textarea oninput="DATA.links[${i}].description=this.value;refresh();">${esc(x.description||"")}</textarea></div>
      </div>
    </div>
  `).join("");
  refresh();
}

function addLink(){
  DATA.links.push({name:"New Link",url:"https://",iconType:"fa",icon:"fa-solid fa-link",color:"#ff2d55",visible:true,newTab:true,description:""});
  renderLinks();
}
function deleteLink(i){ if(confirm("تحذف اللينك؟")){DATA.links.splice(i,1);renderLinks();} }
function moveLink(i,d){let j=i+d;if(j<0||j>=DATA.links.length)return;[DATA.links[i],DATA.links[j]]=[DATA.links[j],DATA.links[i]];renderLinks();}
function uploadIcon(e,i){
  let f=e.target.files[0]; if(!f)return;
  let r=new FileReader();
  r.onload=()=>{DATA.links[i].iconType="img";DATA.links[i].icon=r.result;renderLinks();};
  r.readAsDataURL(f);
}

function renderContent(){
  contentEditor.innerHTML = DATA.content.map((c,i)=>`
    <div class="content-row">
      <div class="mini-grid">
        <div class="field"><label>العنوان</label><input value="${esc(c.title)}" oninput="DATA.content[${i}].title=this.value;refresh();"></div>
        <div class="field"><label>الأيقونة</label><input value="${esc(c.icon)}" oninput="DATA.content[${i}].icon=this.value;refresh();"></div>
        <div class="field full"><label>النص</label><textarea oninput="DATA.content[${i}].text=this.value;refresh();">${esc(c.text)}</textarea></div>
      </div>
    </div>
  `).join("");
}

function downloadJson(){
  refresh();
  const blob = new Blob([JSON.stringify(DATA,null,2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "data.json";
  a.click();
  exportStatus.textContent = "تم تنزيل data.json ✅ ارفعه مكان القديم على GitHub";
}
async function copyJson(){
  refresh();
  await navigator.clipboard.writeText(JSON.stringify(DATA,null,2));
  exportStatus.textContent = "تم نسخ JSON ✅";
}

loadDefault();
</script>
</body>
</html>
